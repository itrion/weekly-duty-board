services:
  app:
    image: node:20-bookworm-slim
    container_name: weekly-duty-board-app
    working_dir: /app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      CHOKIDAR_USEPOLLING: "true"
      DATA_STORE_PATH: /app/data/store.json
    ports:
      - "${APP_PORT:-5001}:5000"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run dev"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app_node_modules:
